<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Team access — InventWood</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1f150c;--ink2:#2a1d11;
  --cream:#f4ecdf;--cream-dim:#cdbfa9;--muted:#9d8d76;
  --wood:#b87d44;--wood-bright:#cda165;--wood-deep:#8a4f23;
  --line:rgba(228,210,180,.16);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:radial-gradient(120% 120% at 50% 0%,var(--ink2) 0%,var(--ink) 60%);color:var(--cream);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:6vh 6vw}
.card{width:100%;max-width:320px}
h1{font-family:'Fraunces',serif;font-weight:400;letter-spacing:-.01em;line-height:1.05;font-size:clamp(1.6rem,4vw,2rem);margin-bottom:10px}
.sub{font-size:.95rem;line-height:1.6;color:var(--cream-dim);font-weight:300;margin-bottom:30px}
input{width:100%;padding:13px 15px;margin-bottom:20px;background:rgba(244,236,223,.04);border:1px solid var(--line);border-radius:8px;color:var(--cream);font-family:'Inter',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
input:focus{border-color:var(--wood)}
input::placeholder{color:var(--muted);opacity:.6}
button{width:100%;padding:14px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--wood-deep),var(--wood));color:var(--cream);font-family:'Inter',sans-serif;font-weight:600;font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:filter .2s,opacity .2s}
button:hover{filter:brightness(1.12)}
button:disabled{opacity:.55;cursor:default}
.err{min-height:22px;font-size:.82rem;color:#d9906b;margin:14px 2px 0;opacity:0;transition:opacity .25s}
.err.show{opacity:1}
</style>
</head>
<body>
<div class="card">
  <h1>Team only</h1>
  <p class="sub">This page is for the InventWood team. Enter the stats key to continue.</p>
  <form id="f" novalidate>
    <input id="key" type="password" placeholder="Stats key" aria-label="Stats key" autocomplete="off" required autofocus>
    <button id="go" type="submit">Continue</button>
    <div id="err" class="err"></div>
  </form>
</div>
<script>
const f=document.getElementById('f'),go=document.getElementById('go'),err=document.getElementById('err');
f.addEventListener('submit',async e=>{
  e.preventDefault();
  err.classList.remove('show');
  const key=document.getElementById('key').value.trim();
  if(!key){err.textContent='Please enter the key.';err.classList.add('show');return;}
  go.disabled=true;go.textContent='Checking…';
  try{
    const r=await fetch('/api/adminkey',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key})});
    const d=await r.json().catch(()=>({}));
    if(r.ok){
      try{localStorage.setItem('sw_stats_key',key);}catch(_){}
      location.href='/changes';return;
    }
    err.textContent=d.error||'Something went wrong. Please try again.';
    err.classList.add('show');
  }catch(_){
    err.textContent='Network error. Please try again.';
    err.classList.add('show');
  }
  go.disabled=false;go.textContent='Continue';
});
</script>
</body>
</html>
